<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Aquarium</title>
  <style>
    :root {
      --bg-top: #06131f;
      --bg-mid: #0b2640;
      --bg-bottom: #123b61;
      --panel: rgba(9, 24, 40, 0.6);
      --text: #d9f3ff;
      --accent: #7de8ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(77, 180, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(125, 232, 255, 0.12), transparent 25%),
        linear-gradient(180deg, var(--bg-top), var(--bg-mid) 55%, var(--bg-bottom));
    }

    canvas {
      display: block;
    }

    .overlay {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 12px 14px;
      border: 1px solid rgba(173, 232, 255, 0.22);
      border-radius: 14px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.2);
      pointer-events: none;
      max-width: 240px;
    }

    .overlay h1 {
      margin: 0 0 6px;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .overlay p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      opacity: 0.88;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Aquarium</h1>
    <p>Drag to orbit, scroll to zoom, and explore the tank while the fish follow procedural paths.</p>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0b2a43, 0.045);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(10, 6.5, 12);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 2.4, 0);
    controls.minDistance = 6;
    controls.maxDistance = 22;
    controls.maxPolarAngle = Math.PI * 0.48;

    const ambientLight = new THREE.HemisphereLight(0xa8e8ff, 0x0f2940, 1.6);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xc9f4ff, 1.8);
    keyLight.position.set(6, 10, 8);
    scene.add(keyLight);

    const fillLight = new THREE.PointLight(0x4bc6ff, 30, 18, 2);
    fillLight.position.set(-4, 5, -2);
    scene.add(fillLight);

    const tank = {
      width: 8.4,
      height: 4.8,
      depth: 4.8,
      wall: 0.08
    };

    const aquariumGroup = new THREE.Group();
    scene.add(aquariumGroup);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(14, 64),
      new THREE.MeshStandardMaterial({
        color: 0x0f2230,
        roughness: 0.85,
        metalness: 0.1
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.9;
    scene.add(floor);

    const floorGlow = new THREE.Mesh(
      new THREE.CircleGeometry(9, 64),
      new THREE.MeshBasicMaterial({
        color: 0x164b71,
        transparent: true,
        opacity: 0.16
      })
    );
    floorGlow.rotation.x = -Math.PI / 2;
    floorGlow.position.y = -0.88;
    scene.add(floorGlow);

    const glassMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xbfe9ff,
      transmission: 0.72,
      transparent: true,
      opacity: 0.26,
      roughness: 0.08,
      metalness: 0.05,
      ior: 1.16,
      thickness: 0.24,
      clearcoat: 1,
      clearcoatRoughness: 0.08,
      reflectivity: 0.6,
      side: THREE.DoubleSide
    });

    const waterMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x2c93c7,
      transparent: true,
      opacity: 0.26,
      roughness: 0.15,
      metalness: 0,
      transmission: 0.3,
      clearcoat: 0.3,
      side: THREE.DoubleSide
    });

    const rimMaterial = new THREE.MeshStandardMaterial({
      color: 0xa4d9f0,
      roughness: 0.2,
      metalness: 0.65
    });

    const tankBox = new THREE.Mesh(
      new THREE.BoxGeometry(tank.width, tank.height, tank.depth),
      glassMaterial
    );
    tankBox.position.y = tank.height / 2;
    aquariumGroup.add(tankBox);

    const water = new THREE.Mesh(
      new THREE.BoxGeometry(tank.width - 0.24, tank.height - 0.38, tank.depth - 0.24),
      waterMaterial
    );
    water.position.y = tank.height / 2 - 0.05;
    aquariumGroup.add(water);

    const rim = new THREE.Mesh(
      new THREE.BoxGeometry(tank.width + 0.14, 0.12, tank.depth + 0.14),
      rimMaterial
    );
    rim.position.y = tank.height + 0.06;
    aquariumGroup.add(rim);

    const rimCutout = new THREE.Mesh(
      new THREE.BoxGeometry(tank.width - 0.36, 0.16, tank.depth - 0.36),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    rimCutout.position.copy(rim.position);
    rimCutout.material.colorWrite = false;
    aquariumGroup.add(rimCutout);

    const gravel = new THREE.Group();
    aquariumGroup.add(gravel);

    const gravelGeometry = new THREE.IcosahedronGeometry(0.08, 0);
    const gravelPalette = [0x547d69, 0xa28f6d, 0x6b8eb0, 0x7f6c56];

    for (let i = 0; i < 180; i += 1) {
      const stone = new THREE.Mesh(
        gravelGeometry,
        new THREE.MeshStandardMaterial({
          color: gravelPalette[i % gravelPalette.length],
          roughness: 0.95,
          metalness: 0.02
        })
      );
      stone.position.set(
        THREE.MathUtils.randFloatSpread(tank.width - 0.9),
        THREE.MathUtils.randFloat(0.02, 0.22),
        THREE.MathUtils.randFloatSpread(tank.depth - 0.9)
      );
      stone.scale.setScalar(THREE.MathUtils.randFloat(0.65, 1.7));
      gravel.add(stone);
    }

    const plantGroup = new THREE.Group();
    aquariumGroup.add(plantGroup);

    function createPlant(x, z, height, color) {
      const plant = new THREE.Group();
      const bladeMaterial = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.8,
        metalness: 0.02,
        side: THREE.DoubleSide
      });

      for (let i = 0; i < 6; i += 1) {
        const blade = new THREE.Mesh(
          new THREE.PlaneGeometry(0.18, height * THREE.MathUtils.randFloat(0.8, 1.15), 1, 8),
          bladeMaterial
        );
        blade.position.y = blade.geometry.parameters.height / 2;
        blade.rotation.y = (Math.PI / 3) * i + THREE.MathUtils.randFloat(-0.2, 0.2);
        blade.rotation.z = THREE.MathUtils.randFloat(-0.25, 0.25);
        blade.userData.baseRotationZ = blade.rotation.z;
        plant.add(blade);
      }

      plant.position.set(x, 0.05, z);
      plant.userData.phase = Math.random() * Math.PI * 2;
      plant.userData.speed = THREE.MathUtils.randFloat(0.8, 1.4);
      plantGroup.add(plant);
    }

    createPlant(-2.8, -1.2, 1.8, 0x4aa56f);
    createPlant(2.7, -1.4, 1.5, 0x62b27e);
    createPlant(-1.1, 1.5, 1.3, 0x3d8d6b);
    createPlant(3.0, 1.2, 1.7, 0x5ebd8a);

    const bubbleCount = 140;
    const bubbleGeometry = new THREE.SphereGeometry(0.04, 10, 10);
    const bubbleMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xdaf6ff,
      transparent: true,
      opacity: 0.45,
      roughness: 0,
      metalness: 0,
      transmission: 0.9
    });
    const bubbles = [];

    for (let i = 0; i < bubbleCount; i += 1) {
      const bubble = new THREE.Mesh(bubbleGeometry, bubbleMaterial);
      bubble.position.set(
        THREE.MathUtils.randFloatSpread(tank.width - 1),
        THREE.MathUtils.randFloat(0.25, tank.height - 0.3),
        THREE.MathUtils.randFloatSpread(tank.depth - 1)
      );
      bubble.userData.speed = THREE.MathUtils.randFloat(0.3, 0.8);
      bubble.userData.wobble = Math.random() * Math.PI * 2;
      bubble.userData.radius = THREE.MathUtils.randFloat(0.02, 0.06);
      bubble.scale.setScalar(THREE.MathUtils.randFloat(0.55, 1.45));
      aquariumGroup.add(bubble);
      bubbles.push(bubble);
    }

    const fishes = [];

    function createFish(colorA, colorB, scale, speed) {
      const fish = new THREE.Group();

      const bodyMaterial = new THREE.MeshStandardMaterial({
        color: colorA,
        roughness: 0.45,
        metalness: 0.12,
        emissive: new THREE.Color(colorA).multiplyScalar(0.08)
      });
      const finMaterial = new THREE.MeshStandardMaterial({
        color: colorB,
        roughness: 0.55,
        metalness: 0.05,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.95
      });

      const body = new THREE.Mesh(new THREE.SphereGeometry(0.42, 24, 18), bodyMaterial);
      body.scale.set(1.45, 0.9, 0.75);
      fish.add(body);

      const tail = new THREE.Group();

      const tailBase = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.08, 0.34, 12),
        bodyMaterial
      );
      tailBase.rotation.z = Math.PI / 2;
      tailBase.position.set(-0.63, 0, 0);
      tail.add(tailBase);

      const tailFinGeometry = new THREE.BufferGeometry();
      tailFinGeometry.setAttribute("position", new THREE.Float32BufferAttribute([
        0.02, 0.0, 0.0,
        -0.34, 0.3, 0.0,
        -0.28, 0.04, 0.0,
        -0.34, -0.3, 0.0
      ], 3));
      tailFinGeometry.setIndex([0, 1, 2, 0, 2, 3]);
      tailFinGeometry.computeVertexNormals();

      const tailFin = new THREE.Mesh(tailFinGeometry, finMaterial);
      tailFin.position.set(-0.82, 0, 0);
      tailFin.scale.set(1.15, 1.05, 1);
      tail.add(tailFin);
      fish.add(tail);

      const dorsal = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.44, 3, 1), finMaterial);
      dorsal.position.set(-0.02, 0.43, 0);
      dorsal.rotation.z = Math.PI;
      dorsal.rotation.y = Math.PI / 2;
      fish.add(dorsal);

      const finLeft = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.35, 3, 1), finMaterial);
      finLeft.position.set(0.04, -0.02, 0.44);
      finLeft.rotation.z = Math.PI * 0.68;
      finLeft.rotation.x = Math.PI * 0.22;
      fish.add(finLeft);

      const finRight = finLeft.clone();
      finRight.position.z = -0.44;
      finRight.rotation.x *= -1;
      fish.add(finRight);

      const pelvicLeft = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.26, 3, 1), finMaterial);
      pelvicLeft.position.set(-0.08, -0.28, 0.18);
      pelvicLeft.rotation.z = Math.PI * 0.88;
      pelvicLeft.rotation.x = Math.PI * 0.18;
      fish.add(pelvicLeft);

      const pelvicRight = pelvicLeft.clone();
      pelvicRight.position.z = -0.18;
      pelvicRight.rotation.x *= -1;
      fish.add(pelvicRight);

      const analFin = new THREE.Mesh(
        new THREE.ConeGeometry(0.11, 0.34, 3, 1),
        finMaterial
      );
      analFin.position.set(-0.24, -0.34, 0);
      analFin.rotation.z = Math.PI;
      analFin.rotation.y = Math.PI / 2;
      fish.add(analFin);

      const eyeGeometry = new THREE.SphereGeometry(0.05, 12, 12);
      const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x101820, roughness: 0.2 });
      const eyeLeft = new THREE.Mesh(eyeGeometry, eyeMaterial);
      eyeLeft.position.set(0.38, 0.1, 0.22);
      fish.add(eyeLeft);

      const eyeRight = eyeLeft.clone();
      eyeRight.position.z = -0.22;
      fish.add(eyeRight);

      fish.scale.setScalar(scale);
      aquariumGroup.add(fish);

      const halfBounds = new THREE.Vector3(
        tank.width / 2 - 0.9,
        tank.height - 0.7,
        tank.depth / 2 - 0.8
      );

      const position = new THREE.Vector3(
        THREE.MathUtils.randFloatSpread(halfBounds.x * 1.6),
        THREE.MathUtils.randFloat(0.8, halfBounds.y),
        THREE.MathUtils.randFloatSpread(halfBounds.z * 1.6)
      );

      const target = position.clone().add(new THREE.Vector3(
        THREE.MathUtils.randFloatSpread(2),
        THREE.MathUtils.randFloatSpread(1.4),
        THREE.MathUtils.randFloatSpread(1.4)
      ));

      fish.position.copy(position);

      fishes.push({
        fish,
        tail,
        tailFin,
        dorsal,
        finLeft,
        finRight,
        pelvicLeft,
        pelvicRight,
        analFin,
        body,
        position,
        velocity: new THREE.Vector3(),
        target,
        bounds: halfBounds,
        speed,
        turnRate: THREE.MathUtils.randFloat(0.9, 1.4),
        wanderTimer: THREE.MathUtils.randFloat(0.4, 2.4),
        swimOffset: Math.random() * Math.PI * 2
      });
    }

    createFish(0xff8a3d, 0xffd36d, 0.72, 1.55);
    createFish(0x56d3ff, 0xa6f0ff, 0.6, 1.25);
    createFish(0xf95f62, 0xffb47d, 0.78, 1.45);
    createFish(0xf4d35e, 0xfff2b4, 0.66, 1.2);
    createFish(0x8a7dff, 0xc1c0ff, 0.7, 1.3);
    createFish(0x52c878, 0xb6efc8, 0.58, 1.1);
    createFish(0xff7bba, 0xffc8de, 0.64, 1.35);

    const clock = new THREE.Clock();
    let elapsedTime = 0;
    const up = new THREE.Vector3(0, 1, 0);

    function chooseNewTarget(fishData, force = false) {
      fishData.wanderTimer -= force ? 10 : 0;
      fishData.target.set(
        THREE.MathUtils.randFloat(-fishData.bounds.x, fishData.bounds.x),
        THREE.MathUtils.randFloat(0.65, fishData.bounds.y),
        THREE.MathUtils.randFloat(-fishData.bounds.z, fishData.bounds.z)
      );
      fishData.wanderTimer = THREE.MathUtils.randFloat(1.8, 4.5);
    }

    function animateFish(fishData, elapsed, delta) {
      fishData.wanderTimer -= delta;
      if (fishData.wanderTimer <= 0 || fishData.position.distanceTo(fishData.target) < 0.45) {
        chooseNewTarget(fishData);
      }

      const desired = fishData.target.clone().sub(fishData.position);

      if (desired.lengthSq() < 0.0001) {
        chooseNewTarget(fishData, true);
        return;
      }

      desired.normalize().multiplyScalar(fishData.speed);
      fishData.velocity.lerp(desired, delta * fishData.turnRate);

      const nextPosition = fishData.position.clone().addScaledVector(fishData.velocity, delta);

      if (
        Math.abs(nextPosition.x) > fishData.bounds.x ||
        Math.abs(nextPosition.z) > fishData.bounds.z ||
        nextPosition.y < 0.5 ||
        nextPosition.y > fishData.bounds.y
      ) {
        chooseNewTarget(fishData, true);
        fishData.velocity.multiplyScalar(0.7);
      } else {
        fishData.position.copy(nextPosition);
      }

      fishData.fish.position.copy(fishData.position);

      const direction = fishData.velocity.clone().normalize();
      if (direction.lengthSq() > 0.001) {
        const targetQuat = new THREE.Quaternion().setFromRotationMatrix(
          new THREE.Matrix4().lookAt(
            fishData.position,
            fishData.position.clone().add(direction),
            up
          )
        );
        fishData.fish.quaternion.slerp(targetQuat, delta * 3.2);
      }

      const swim = Math.sin(elapsed * 7.5 + fishData.swimOffset);
      const glide = Math.sin(elapsed * 2.2 + fishData.swimOffset);
      fishData.tail.rotation.y = swim * 0.55;
      fishData.tail.rotation.z = swim * 0.08;
      fishData.tailFin.scale.y = 1 + Math.abs(swim) * 0.18;
      fishData.dorsal.rotation.x = glide * 0.08;
      fishData.finLeft.rotation.y = 0.28 + swim * 0.24;
      fishData.finRight.rotation.y = -0.28 - swim * 0.24;
      fishData.pelvicLeft.rotation.y = 0.18 + glide * 0.18;
      fishData.pelvicRight.rotation.y = -0.18 - glide * 0.18;
      fishData.analFin.rotation.x = glide * 0.1;
      fishData.body.rotation.z = glide * 0.04;
    }

    function animatePlants(elapsed) {
      for (const plant of plantGroup.children) {
        const sway = Math.sin(elapsed * plant.userData.speed + plant.userData.phase) * 0.12;
        for (const blade of plant.children) {
          blade.rotation.z += (blade.userData.baseRotationZ + sway - blade.rotation.z) * 0.06;
        }
      }
    }

    function animateBubbles(elapsed, delta) {
      for (const bubble of bubbles) {
        bubble.position.y += bubble.userData.speed * delta;
        bubble.position.x += Math.sin(elapsed * 1.3 + bubble.userData.wobble) * 0.0025;
        bubble.position.z += Math.cos(elapsed * 1.1 + bubble.userData.wobble) * 0.002;
        if (bubble.position.y > tank.height - 0.18) {
          bubble.position.set(
            THREE.MathUtils.randFloatSpread(tank.width - 1),
            THREE.MathUtils.randFloat(0.18, 0.5),
            THREE.MathUtils.randFloatSpread(tank.depth - 1)
          );
        }
      }
    }

    function animateWater(elapsed) {
      water.position.y = tank.height / 2 - 0.05 + Math.sin(elapsed * 1.4) * 0.03;
      water.rotation.z = Math.sin(elapsed * 0.45) * 0.01;
      tankBox.rotation.y = Math.sin(elapsed * 0.2) * 0.02;
    }

    function render() {
      const delta = Math.min(clock.getDelta(), 0.033);
      elapsedTime += delta;

      controls.update();
      animatePlants(elapsedTime);
      animateBubbles(elapsedTime, delta);
      animateWater(elapsedTime);
      for (const fishData of fishes) {
        animateFish(fishData, elapsedTime, delta);
      }

      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    render();
  </script>
</body>
</html>
