<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Petri Apex</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-a: #04111d;
        --bg-b: #0a2e4f;
        --text: #d9f7ff;
        --muted: #96c6db;
        --accent: #7df5ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(86, 185, 255, 0.18), transparent 35%),
          linear-gradient(180deg, var(--bg-b), var(--bg-a));
        color: var(--text);
      }

      body {
        position: relative;
      }

      #game {
        width: 100vw;
        height: 100vh;
      }

      #info {
        position: fixed;
        left: 18px;
        bottom: 18px;
        z-index: 10;
        max-width: min(360px, calc(100vw - 36px));
        padding: 12px 14px;
        border: 1px solid rgba(125, 245, 255, 0.22);
        border-radius: 14px;
        background: rgba(5, 16, 28, 0.72);
        backdrop-filter: blur(10px);
        pointer-events: none;
      }

      #info h1 {
        margin: 0 0 6px;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      #info p {
        margin: 0;
        font-size: 13px;
        line-height: 1.45;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <section id="info">
      <h1>Petri Apex</h1>
      <p>Glide toward the cursor, eat green food and smaller organisms, and evolve from Stage 1 to Stage 5 before a larger hunter absorbs you.</p>
    </section>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
